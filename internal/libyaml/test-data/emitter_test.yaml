- name: Multiple documents
  type: emit
  events:
  - type: STREAM_START_EVENT
    encoding: UTF8_ENCODING
  - type: DOCUMENT_START_EVENT
    implicit: false
  - type: SCALAR_EVENT
    value: doc1
    implicit: true
    style: PLAIN_SCALAR_STYLE
  - type: DOCUMENT_END_EVENT
    implicit: false
  - type: DOCUMENT_START_EVENT
    implicit: false
  - type: SCALAR_EVENT
    value: doc2
    implicit: true
    style: PLAIN_SCALAR_STYLE
  - type: DOCUMENT_END_EVENT
    implicit: false
  - type: STREAM_END_EVENT
  want: ---

- name: Nested structures
  type: emit
  events:
  - type: STREAM_START_EVENT
    encoding: UTF8_ENCODING
  - type: DOCUMENT_START_EVENT
    implicit: true
  - type: MAPPING_START_EVENT
    implicit: true
    style: BLOCK_MAPPING_STYLE
  - type: SCALAR_EVENT
    value: parent
    implicit: true
    style: PLAIN_SCALAR_STYLE
  - type: SEQUENCE_START_EVENT
    implicit: true
    style: BLOCK_SEQUENCE_STYLE
  - type: MAPPING_START_EVENT
    implicit: true
    style: BLOCK_MAPPING_STYLE
  - type: SCALAR_EVENT
    value: child
    implicit: true
    style: PLAIN_SCALAR_STYLE
  - type: SCALAR_EVENT
    value: value
    implicit: true
    style: PLAIN_SCALAR_STYLE
