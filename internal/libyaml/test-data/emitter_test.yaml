# Config tests
- name: Canonical mode
  type: emit-config
  config:
    canonical: true
  events:
  - type: STREAM_START_EVENT
    encoding: UTF8_ENCODING
  - type: DOCUMENT_START_EVENT
    implicit: false
  - type: SCALAR_EVENT
    value: value
    implicit: true
    style: PLAIN_SCALAR_STYLE
  - type: DOCUMENT_END_EVENT
    implicit: false
  - type: STREAM_END_EVENT
  want: ---

- name: Custom indent
  type: emit-config
  config:
    indent: 4
  events:
  - type: STREAM_START_EVENT
    encoding: UTF8_ENCODING
  - type: DOCUMENT_START_EVENT
    implicit: true
  - type: MAPPING_START_EVENT
    implicit: true
    style: BLOCK_MAPPING_STYLE
  - type: SCALAR_EVENT
