    implicit: true
    style: PLAIN_SCALAR_STYLE
  - type: MAPPING_START_EVENT
    implicit: true
    style: BLOCK_MAPPING_STYLE
  - type: SCALAR_EVENT
    value: nested
    implicit: true
    style: PLAIN_SCALAR_STYLE
  - type: SCALAR_EVENT
    value: value
    implicit: true
    style: PLAIN_SCALAR_STYLE
  - type: MAPPING_END_EVENT
  - type: MAPPING_END_EVENT
  - type: DOCUMENT_END_EVENT
    implicit: true
  - type: STREAM_END_EVENT
  want: key

- name: Custom width
