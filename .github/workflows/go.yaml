name: Go

on:
  push:
    branches: [ main, v3, v2, v1 ]
  pull_request:
    branches: [ main, v3, v2, v1 ]

permissions: read-all

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0
      with:
        persist-credentials: false
    - name: Set up Go
      uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00  # v6.0.0
      with:
        go-version: stable
    - name: Install golangci-lint
      run: |
        make golangci-lint-install
        echo "${{ github.workspace }}/.cache/local/bin" >> "$GITHUB_PATH"
    # yamllint disable-line rule:line-length
    - uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9  # v8.0.0
      with:
        install-mode: none
  go-versions:
    name: Lookup Go versions
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.versions.outputs.matrix }}
    steps:
    - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0
    # yamllint disable-line rule:line-length
    - uses: arnested/go-version-action@81f730770833dd20e6365d535ce7efcb3b136e7d  # v1.1.21
      id: versions
  build-linux-amd64:
    runs-on: ubuntu-latest
    needs: go-versions
    continue-on-error: true  # make sure to run all versions, even if one fails
    strategy:
      fail-fast: false  # continue to run all jobs even if one fails
      matrix:
        go-version: ${{ fromJSON(needs.go-versions.outputs.matrix) }}
    name: >
      Build with Go ${{ matrix.go-version }}
      for linux/amd64
    steps:
    - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0
      with:
        persist-credentials: false
    - name: Set up Go
      uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00  # v6.0.0
      with:
        go-version: ${{ matrix.go-version }}
    - name: Run go vet
      run: go vet ./...
    - name: Run yaml-test-suite tests
      run: make test-yts
    - name: Run go test with race detection
      run: go test -v -race .

  build-others:
    runs-on: ${{ matrix.os }}
    continue-on-error: true   # make sure to run all versions, even if one fails
    strategy:
      fail-fast: false  # continue to run all jobs even if one fails
      matrix:
        include:
        - {
          os: macos-latest,
          GOOS: darwin,
          GOARCH: amd64,
          test-args: -race
        }
        - {
          os: macos-latest,
          GOOS: darwin,
          GOARCH: arm64,
          test-args: -race
        }
        - {
          os: windows-latest,
          GOOS: windows,
          GOARCH: amd64,
          test-args: -race
        }
        - {
          os: ubuntu-latest,
          GOOS: linux,
          GOARCH: 386,
          test-args: ''  # race is not available on 32 bits architecture
        }
        - {
          os: windows-latest,
          GOOS: windows,
          GOARCH: 386,
          test-args: ''  # race is not available on 32 bits architecture
        }
    env:
      # GOARCH and GOOS are used by the Go toolchain
      GOARCH: ${{ matrix.GOARCH }}
      GOOS: ${{ matrix.GOOS }}
    name: >
      Build with Go stable
      for ${{ matrix.GOOS }}/${{ matrix.GOARCH }}
    steps:
    - uses: actions/checkout@v5
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: stable
    - name: Run go vet
      run: go vet ./...
    - name: Run yaml-test-suite tests
      run: make test-yts
      # make test-yts can only be run on non-Windows OS
      if: ${{ matrix.GOOS != 'windows' }}
      env:
        # This one is used by makeplus/makes
        OS-TYPE: ${{ matrix.GOOS }}
    - name: Run go test
      run: go test -v ${{ matrix.test-args }} .
